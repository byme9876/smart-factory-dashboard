<!DOCTYPE html>
<html>

<head>

    <title>Factory History</title>

    <style>
        .navbar{

    background-color: darkblue;

    padding: 15px;

    margin-bottom: 30px;

    border-radius: 10px;
}

.navbar a{

    color: white;

    text-decoration: none;

    margin-right: 20px;

    font-size: 18px;

    font-weight: bold;
}
        body{
            font-family: Arial;
            padding: 30px;
            background-color: #f4f4f4;
        }

        h1{
            color: darkblue;
        }

        table{
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th, td{
            border: 1px solid gray;
            padding: 12px;
            text-align: center;
        }

        th{
            background-color: darkblue;
            color: white;
        }

    </style>

</head>

<body>
    <div class="navbar">

    <a href="/">Dashboard</a>

    <a href="/history">History</a>

    </div>
    <h1>Factory Data History</h1>

    <table>

        <tr>
            <th>ID</th>
            <th>Temperature</th>
            <th>Machine Status</th>
            <th>Efficiency</th>
        </tr>

        {% for record in records %}

        <tr>

            <td>{{ record.id }}</td>

            <td>{{ record.temperature }} °C</td>

            <td>{{ record.machine_status }}</td>

            <td>{{ record.efficiency }} %</td>

        </tr>

        {% endfor %}

    </table>

</body>

</html>
